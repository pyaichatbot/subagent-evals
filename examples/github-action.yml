name: subagent-evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pyaichatbot/subagent-evals-action@v0
        with:
          working-directory: .
          config: subagent-evals.config.yaml
          post-comment: true
          baseline-mode: git-base
